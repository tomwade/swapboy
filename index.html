<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>POKéMON Uniswap Edition</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #17171c;
        overflow: hidden;
      }
      #root {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* DMG-style shell around the screen */
      .gb-shell {
        background: #c5c1bc;
        border-radius: 12px 12px 56px 12px;
        padding: 16px 24px 22px;
        box-shadow:
          inset 5px 5px 12px rgba(255, 255, 255, 0.55),
          inset -6px -8px 14px rgba(0, 0, 0, 0.22),
          0 16px 44px rgba(0, 0, 0, 0.65);
      }
      .gb-bezel {
        position: relative;
        background: #585567;
        border-radius: 10px 10px 36px 10px;
        padding: 26px 40px 30px;
        box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.45);
      }
      .gb-bezel-caption {
        position: absolute;
        top: 7px;
        left: 0;
        right: 0;
        text-align: center;
        font: 600 9px/1 'Helvetica Neue', Arial, sans-serif;
        letter-spacing: 0.18em;
        color: #b9b4d4;
        user-select: none;
      }
      .gb-bezel-caption::before,
      .gb-bezel-caption::after {
        content: '';
        position: absolute;
        top: 3px;
        width: 12%;
        height: 1px;
        background: #8d2942;
        box-shadow: 0 3px 0 #2d3f8f;
      }
      .gb-bezel-caption::before { left: 6%; }
      .gb-bezel-caption::after { right: 6%; }
      .gb-led-wrap {
        position: absolute;
        left: 5px;
        top: 50%;
        transform: translateY(-50%);
        width: 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font: 600 6px/1 'Helvetica Neue', Arial, sans-serif;
        letter-spacing: 0.04em;
        color: #b9b4d4;
        user-select: none;
      }
      .gb-led {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #d8302f;
        box-shadow: 0 0 7px rgba(255, 80, 70, 0.9), inset 0 -1px 2px rgba(0, 0, 0, 0.4);
      }
      .gb-screen-wrap {
        background: #000;
        line-height: 0;
      }
      .gb-brand {
        margin-top: 13px;
        text-align: left;
        padding-left: 6px;
        font: italic 700 17px/1 'Helvetica Neue', Arial, sans-serif;
        letter-spacing: 0.01em;
        color: #2f327e;
        user-select: none;
      }
      .gb-brand .tm {
        font-size: 8px;
        vertical-align: super;
        font-style: normal;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        display: block;
      }
      /* On-screen DMG controls: touch devices only */
      .gb-controls {
        display: none;
      }
      @media (hover: none) and (pointer: coarse) {
        #root {
          overflow-y: auto;
        }
        /* margin:auto keeps an overflowing shell scrollable from the top in flex centering */
        .gb-shell {
          margin: auto;
          padding: 10px 8px 18px;
        }
        .gb-bezel {
          padding: 24px 10px 18px;
        }
        .gb-led-wrap {
          display: none;
        }
        .gb-controls {
          display: block;
          margin-top: 16px;
          touch-action: none;
          user-select: none;
          -webkit-user-select: none;
          -webkit-touch-callout: none;
        }
        .gb-controls-row {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 10px;
        }
        .gb-dpad {
          position: relative;
          width: 120px;
          height: 120px;
        }
        .gb-dpad-cross {
          position: absolute;
          inset: 0;
          transition: transform 60ms;
        }
        .gb-dpad[data-dir='up'] .gb-dpad-cross { transform: translateY(-2px); }
        .gb-dpad[data-dir='down'] .gb-dpad-cross { transform: translateY(2px); }
        .gb-dpad[data-dir='left'] .gb-dpad-cross { transform: translateX(-2px); }
        .gb-dpad[data-dir='right'] .gb-dpad-cross { transform: translateX(2px); }
        .gb-dpad-h,
        .gb-dpad-v {
          position: absolute;
          background: #2c2b33;
          border-radius: 7px;
          box-shadow:
            inset 0 2px 2px rgba(255, 255, 255, 0.22),
            inset 0 -3px 4px rgba(0, 0, 0, 0.5),
            0 3px 6px rgba(0, 0, 0, 0.35);
        }
        .gb-dpad-h {
          left: 0;
          right: 0;
          top: 40px;
          height: 40px;
        }
        .gb-dpad-v {
          top: 0;
          bottom: 0;
          left: 40px;
          width: 40px;
        }
        .gb-dpad-center {
          position: absolute;
          left: 47px;
          top: 47px;
          width: 26px;
          height: 26px;
          border-radius: 50%;
          background: radial-gradient(circle at 35% 30%, #3a3942, #232229 70%);
        }
        .gb-ab {
          display: flex;
          align-items: center;
          gap: 18px;
          transform: rotate(-22deg);
        }
        .gb-ab-btn {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 7px;
        }
        .gb-ab-btn button {
          width: 56px;
          height: 56px;
          border-radius: 50%;
          border: none;
          padding: 0;
          background: radial-gradient(circle at 35% 30%, #b0496b, #8d2942 65%);
          box-shadow:
            inset 0 2px 3px rgba(255, 255, 255, 0.35),
            inset 0 -4px 5px rgba(0, 0, 0, 0.35),
            0 4px 7px rgba(0, 0, 0, 0.4);
        }
        .gb-ab-btn button[data-pressed='true'] {
          transform: translateY(2px);
          box-shadow:
            inset 0 3px 5px rgba(0, 0, 0, 0.4),
            0 1px 2px rgba(0, 0, 0, 0.4);
        }
        .gb-ab-btn span,
        .gb-ss-btn span {
          font: italic 700 11px/1 'Helvetica Neue', Arial, sans-serif;
          letter-spacing: 0.08em;
          color: #2f327e;
        }
        .gb-ss {
          display: flex;
          justify-content: center;
          gap: 30px;
          margin-top: 14px;
        }
        .gb-ss-btn {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 6px;
          transform: rotate(-22deg);
        }
        .gb-ss-btn button {
          width: 44px;
          height: 13px;
          border-radius: 7px;
          border: none;
          padding: 0;
          background: linear-gradient(#9b97a8, #76727f);
          box-shadow:
            inset 0 1px 1px rgba(255, 255, 255, 0.4),
            inset 0 -2px 2px rgba(0, 0, 0, 0.4),
            0 2px 3px rgba(0, 0, 0, 0.35);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
